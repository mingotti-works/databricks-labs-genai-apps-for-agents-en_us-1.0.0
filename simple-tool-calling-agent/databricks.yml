bundle:
  name: tool_calling_chatbot


variables:
  catalog_name:
    description: "Per-user lab catalog, e.g. labuser_matthew_mccoy"
    default: ${var.catalog_name}
  function_1_name:
    description: "Function to grab the average neighborhood price"
    default: avg_neigh_price


resources:
  experiments:
    chatbot_experiment:
      name: /Users/${workspace.current_user.userName}/simple-chatbot-experiment

  apps:
    tool_calling_chatbot:
      name: agent-${workspace.current_user.id}-${bundle.target}-2
      description: "Simple chatbot agent with MLflow tracing"
      source_code_path: ./
      resources:

        - name: serving-endpoint
          serving_endpoint:
            name: databricks-gpt-5-2
            permission: CAN_QUERY

        - name: app-experiment
          experiment:
            experiment_id: ${resources.experiments.chatbot_experiment.id}
            permission: CAN_EDIT

        - name: uc-function-1
          uc_securable:
            securable_full_name: ${var.catalog_name}.agent_apps.${var.function_1_name}
            securable_type: FUNCTION
            permission: EXECUTE


targets:
  dev:
    mode: development
    default: true
