bundle:
  name: mlflow_chatbot

resources:
  experiments:
    chatbot_experiment:
      name: /Users/${workspace.current_user.userName}/simple-chatbot-experiment

  apps:
    mlflow_chatbot:
      name: agent-${workspace.current_user.id}-${bundle.target}-2
      description: "Simple chatbot agent with MLflow tracing"
      source_code_path: ./
      resources:
        - name: serving-endpoint
          serving_endpoint:
            name: databricks-gpt-5-2
            permission: CAN_QUERY
        - name: app-experiment
          experiment:
            experiment_id: ${resources.experiments.chatbot_experiment.id}
            permission: CAN_EDIT

targets:
  dev:
    mode: development
    default: true
